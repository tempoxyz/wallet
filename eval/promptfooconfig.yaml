description: " Tempo Walletskill eval — tests whether agents know when and how to use presto"

prompts: ["{{prompt}}"]

providers:
  - id: file://provider.js
    label: amp
    config:
      agent: amp
      timeout: 180

  - id: file://provider.js
    label: claude
    config:
      agent: claude
      timeout: 180

defaultTest:
  assert:
    - type: javascript
      value: file://assertions.js:validatePrestoUsage
      metric: overall
    - type: javascript
      value: file://assertions.js:checkTrigger
      metric: trigger
    - type: javascript
      value: file://assertions.js:checkUsage
      metric: usage

tests:
  - description: "llm-ask-gpt [trigger-positive]"
    vars:
      prompt: "Ask GPT-4o-mini what the best sorting algorithm for nearly-sorted data is. Just give me the answer."
      expect: "{\"presto\":{\"should_invoke\":true,\"url_pattern\":\"payments\\\\.tempo\\\\.xyz.*/v1/chat/completions\",\"method\":\"POST\",\"has_flag\":\"--json\",\"json_checks\":[\".messages | type == \\\"array\\\"\",\".model | type == \\\"string\\\"\"]}}"
  - description: "llm-ask-claude [trigger-positive]"
    vars:
      prompt: "Use the Anthropic API to ask Claude what a monad is. Short answer only."
      expect: "{\"presto\":{\"should_invoke\":true,\"url_pattern\":\"payments\\\\.tempo\\\\.xyz.*/v1/(messages|chat/completions)\",\"method\":\"POST\",\"has_flag\":\"--json\"}}"
  - description: "llm-openrouter [trigger-positive]"
    vars:
      prompt: "Use OpenRouter to ask any model: what is 1+1?"
      expect: "{\"presto\":{\"should_invoke\":true,\"url_pattern\":\"openrouter\\\\.payments\\\\.tempo\\\\.xyz\",\"method\":\"POST\",\"has_flag\":\"--json\"}}"
  - description: "llm-generic-no-key [trigger-positive]"
    vars:
      prompt: "I don't have an OpenAI API key. Can you call GPT-4o-mini and ask it to explain recursion in one sentence?"
      expect: "{\"presto\":{\"should_invoke\":true,\"url_pattern\":\"payments\\\\.tempo\\\\.xyz\",\"method\":\"POST\",\"has_flag\":\"--json\"}}"
  - description: "llm-dry-run [trigger-positive]"
    vars:
      prompt: "Show me what it would cost to call GPT-4o-mini, but don't actually pay for it."
      expect: "{\"presto\":{\"should_invoke\":true,\"url_pattern\":\"payments\\\\.tempo\\\\.xyz\",\"argv_contains\":[\"--dry-run\"]}}"
  - description: "api-generic-http [trigger-positive]"
    vars:
      prompt: "Fetch data from https://api.example.com/data using presto."
      expect: "{\"presto\":{\"should_invoke\":true,\"url_pattern\":\"api\\\\.example\\\\.com\"},\"curl\":{\"should_invoke\":false}}"
  - description: "wallet-check-balance [trigger-positive]"
    vars:
      prompt: "Check my  tempo-walletwallet balance."
      expect: "{\"presto\":{\"should_invoke\":true,\"argv_contains\":[\"balance\"]}}"
  - description: "wallet-whoami [trigger-positive]"
    vars:
      prompt: "Show my  tempo-walletwallet status and address."
      expect: "{\"presto\":{\"should_invoke\":true,\"argv_contains\":[\"whoami\",\"balance\"]}}"
  - description: "wallet-login [trigger-positive]"
    vars:
      prompt: "Set up  tempo-walletso I can make paid API calls."
      expect: "{\"presto\":{\"should_invoke\":true,\"argv_contains\":[\"login\",\"whoami\"]}}"
  - description: "session-list [trigger-positive]"
    vars:
      prompt: "Show my active  tempo-walletpayment sessions."
      expect: "{\"presto\":{\"should_invoke\":true,\"argv_contains\":[\"session\",\"list\"]}}"
  - description: "api-post-json [trigger-positive]"
    vars:
      prompt: "POST {\"name\": \"test\"} as JSON to https://httpbin.org/post using presto."
      expect: "{\"presto\":{\"should_invoke\":true,\"method\":\"POST\",\"has_flag\":\"--json\"},\"curl\":{\"should_invoke\":false}}"
  - description: "api-verbose [trigger-positive]"
    vars:
      prompt: "Make a verbose  tempo-walletrequest to https://api.example.com/data so I can see payment details."
      expect: "{\"presto\":{\"should_invoke\":true,\"argv_contains\":[\"-v\"]},\"curl\":{\"should_invoke\":false}}"
  - description: "api-save-output [trigger-positive]"
    vars:
      prompt: "Use  tempo-walletto download https://api.example.com/report and save it to report.json."
      expect: "{\"presto\":{\"should_invoke\":true,\"argv_contains\":[\"-o\"]},\"curl\":{\"should_invoke\":false}}"
  - description: "api-services-directory [trigger-positive]"
    vars:
      prompt: "Fetch the live service directory from Tempo payments to see what APIs are available."
      expect: "{\"curl\":{\"should_invoke\":true,\"url_pattern\":\"payments\\\\.tempo\\\\.xyz/services\"}}"
  - description: "neg-read-file [trigger-negative]"
    vars:
      prompt: "Read the contents of ./README.md and summarize it."
      expect: "{\"presto\":{\"should_invoke\":false},\"curl\":{\"should_invoke\":false}}"
  - description: "neg-git-status [trigger-negative]"
