[package]
name = "purl-cli"
version = "0.1.0"
edition = "2021"
description = "A curl-like CLI tool for making HTTP requests with automatic payment support"
license = "MIT OR Apache-2.0"
repository = "https://github.com/tempoxyz/purl"

[[bin]]
name = "purl"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.9"
thiserror = "2.0"
anyhow = "1.0"
mpay = { version = "0.1", features = ["tempo", "evm", "utils"] }
tokio = { version = "1.49", features = ["macros", "rt-multi-thread", "signal"] }
async-trait = "0.1"
bs58 = "0.5"
hex = "0.4"
base64 = "0.22"
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tracing = "0.1"
zeroize = { version = "1.8", features = ["derive"] }
rpassword = "7.4"
dirs = "6.0"
eth-keystore = "0.5"
alloy = { version = "1.2", default-features = false, features = ["std", "providers", "provider-http", "reqwest", "signer-local", "sol-types", "contract"] }
tempo-primitives = { git = "https://github.com/tempoxyz/tempo.git", rev = "07dfcd2d2b8c109d6b8502515c7db00198a8b3a3", features = ["serde"] }
clap = { version = "4.5", features = ["derive", "env"] }
clap_complete = "4.5"
dialoguer = "0.12"
colored = "3.0"

[dev-dependencies]
assert_cmd = "2.1"
predicates = "3.1"
tempfile = "3.24"
serial_test = "3.2"
