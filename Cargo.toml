[workspace]
members = ["lib", "cli"]
resolver = "2"

# Note: Despite directory names, the actual crate names are:
# - lib/ contains the 'purl' crate (the library)
# - cli/ contains the 'purl-cli' crate (the CLI binary)

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.9"
alloy = { version = "1.2", features = ["full"] }
alloy-signer-local = "1.2"
solana-sdk = "3.0"
solana-client = "3.1"
spl-associated-token-account = { version = "8.0", features = ["no-entrypoint"] }
bs58 = "0.5"
bincode = "3.0"
hex = "0.4"
base64 = "0.22"
rand = "0.8"
regex = "1.11"
zeroize = { version = "1.8", features = ["derive"] }
eth-keystore = "0.5"
anyhow = "1.0"
thiserror = "2.0"
dirs = "6.0"
rpassword = "7.4"
tokio = { version = "1.49", features = ["full"] }
async-trait = "0.1"

# Tempo transaction types (used for Tempo network support)
tempo-primitives = { git = "https://github.com/tempoxyz/tempo.git", rev = "07dfcd2d2b8c109d6b8502515c7db00198a8b3a3", features = ["serde"] }
