id: no-leading-whitespace-strings
valid:
  - |
    let msg = "hello";
  - |
    let msg = "hello world";
  - |
    let empty = "";
  - |
    let spaced = "hello ";
  - |
    let indented = "  two spaces ok";
  - |
    let format = " {foo}";

invalid:
  - |
    let padded = " foo";
  - |
    let bad = " bar";
