[advisories]
yanked = "warn"
ignore = [
  # paste is archived; retained via upstream dependency graph
  "RUSTSEC-2024-0436",
  # bincode is marked unmaintained; retained via syntect
  "RUSTSEC-2025-0141",
  # yaml-rust is unmaintained; retained via syntect
  "RUSTSEC-2024-0320",
  # rustls-pemfile is unmaintained; retained via reqwest 0.11 in posthog-rs
  "RUSTSEC-2025-0134",
  # rustls-webpki fix is not yet available on the reqwest 0.11/rustls 0.21 path
  "RUSTSEC-2026-0049",
  # tracing-subscriber 0.2 is pinned by ark-relations via revm-precompile; no upgrade path
  "RUSTSEC-2025-0055",
  # derivative is unmaintained; pinned by ark-ff via revm-precompile
  "RUSTSEC-2024-0388",
  # lru 0.12 is pinned by ratatui 0.29 via toon-format; 0.16.3 already in tree for other consumers
  "RUSTSEC-2026-0002",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [{ name = "openssl", wrappers = ["native-tls"] }]
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }
unused-allowed-license = "warn"
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "0BSD",
  "CC0-1.0",
  "ISC",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
  "LicenseRef-rustls-webpki",
  "CDLA-Permissive-2.0",
  "OpenSSL",
]

exceptions = [
  # MPL-2.0 transitives currently required by dependency graph.
  { allow = ["MPL-2.0"], name = "colored" },
  { allow = ["MPL-2.0"], name = "option-ext" },
  { allow = ["MPL-2.0"], name = "webpki-roots" },
]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-git = [
  "https://github.com/paradigmxyz/reth",
  "https://github.com/tempoxyz/mpp-rs.git",
  "https://github.com/tempoxyz/tempo.git",
  "https://github.com/tempoxyz/tempo",
]
