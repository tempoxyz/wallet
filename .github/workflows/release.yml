name: Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: presto-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: presto-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: presto-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: strip target/${{ matrix.target }}/release/presto
      - run: mv target/${{ matrix.target }}/release/ tempo-wallet${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: echo "version=presto@${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.version.outputs.version }}" artifacts/* --clobber

      - name: Upload binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # Disable multipart uploads (R2 may reject CreateMultipartUpload)
          aws configure set default.s3.multipart_threshold 200MB

          VERSION="v${{ inputs.version }}"

          for f in artifacts/*; do
            BASENAME=$(basename "$f")
            # Upload as latest
            aws s3 cp "$f" "s3://presto-binaries/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
            # Upload with version prefix
            aws s3 cp "$f" "s3://presto-binaries/${VERSION}/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Upload install script and AI skills
          aws s3 cp install.sh "s3://presto-binaries/install.sh" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"
          aws s3 cp .agents/skills/presto-passkey/SKILL.md "s3://presto-binaries/SKILL-passkey.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"
          aws s3 cp .agents/skills/presto-local/SKILL.md "s3://presto-binaries/SKILL-local.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"

          echo "Uploaded ${VERSION} binaries to R2"
