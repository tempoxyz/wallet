name: Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tempo-wallet-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: tempo-wallet-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: tempo-wallet-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: strip target/${{ matrix.target }}/release/tempo-wallet
      - run: mv target/${{ matrix.target }}/release/tempo-wallet ${{ matrix.asset }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: echo "version=tempo-wallet@${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.version.outputs.version }}" artifacts/* --clobber

      - name: Sign release binaries
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          echo -n "$RELEASE_SIGNING_KEY" | base64 -d > /tmp/release.key
          cargo run --bin sign-release -- \
            --key-file /tmp/release.key \
            --artifacts-dir artifacts \
            --version "${{ inputs.version }}" \
            --base-url https://cli.tempo.xyz/extensions/tempo-wallet \
            --skill "https://cli.tempo.xyz/extensions/tempo-wallet/v${{ inputs.version }}/SKILL.md" \
            --output artifacts/manifest.json
          rm /tmp/release.key

      - name: Upload binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # Disable multipart uploads (R2 may reject CreateMultipartUpload)
          aws configure set default.s3.multipart_threshold 200MB

          VERSION="v${{ inputs.version }}"

          for f in artifacts/tempo-wallet-*; do
            BASENAME=$(basename "$f")
            # Upload as latest (legacy path for install.sh)
            aws s3 cp "$f" "s3://tempo-cli/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
            # Upload with version prefix under extensions/
            aws s3 cp "$f" "s3://tempo-cli/extensions/tempo-wallet/${VERSION}/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Upload signed manifest for tempo CLI auto-install (latest + versioned)
          aws s3 cp artifacts/manifest.json "s3://tempo-cli/extensions/tempo-wallet/manifest.json" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "application/json"
          aws s3 cp artifacts/manifest.json "s3://tempo-cli/extensions/tempo-wallet/${VERSION}/manifest.json" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "application/json"

          # Upload SKILL.md for tempo CLI auto-install (latest + versioned)
          aws s3 cp .agents/skills/tempo-wallet/SKILL.md "s3://tempo-cli/extensions/tempo-wallet/SKILL.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"
          aws s3 cp .agents/skills/tempo-wallet/SKILL.md "s3://tempo-cli/extensions/tempo-wallet/${VERSION}/SKILL.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"

          # Upload install script and AI skills
          aws s3 cp install.sh "s3://tempo-cli/install.sh" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"
          aws s3 cp .agents/skills/tempo-wallet-passkey/SKILL.md "s3://tempo-cli/SKILL-passkey.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"
          aws s3 cp .agents/skills/tempo-wallet-local/SKILL.md "s3://tempo-cli/SKILL-local.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"

          # Upload VERSION file for auto-update checks
          echo "${{ inputs.version }}" > VERSION
          aws s3 cp VERSION "s3://tempo-cli/VERSION" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"

          echo "Uploaded ${VERSION} binaries and signed manifest to R2"
