name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' crates/tempo-wallet/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.package }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # tempo-cli builds (binary name: tempo)
          - package: tempo-cli
            binary: tempo
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tempo-linux-amd64
          - package: tempo-cli
            binary: tempo
            os: macos-latest
            target: x86_64-apple-darwin
            asset: tempo-darwin-amd64
          - package: tempo-cli
            binary: tempo
            os: macos-latest
            target: aarch64-apple-darwin
            asset: tempo-darwin-arm64
          # tempo-wallet builds
          - package: tempo-wallet
            binary: tempo-wallet
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tempo-wallet-linux-amd64
          - package: tempo-wallet
            binary: tempo-wallet
            os: macos-latest
            target: x86_64-apple-darwin
            asset: tempo-wallet-darwin-amd64
          - package: tempo-wallet
            binary: tempo-wallet
            os: macos-latest
            target: aarch64-apple-darwin
            asset: tempo-wallet-darwin-arm64
          # tempo-mpp builds
          - package: tempo-mpp
            binary: tempo-mpp
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tempo-mpp-linux-amd64
          - package: tempo-mpp
            binary: tempo-mpp
            os: macos-latest
            target: x86_64-apple-darwin
            asset: tempo-mpp-darwin-amd64
          - package: tempo-mpp
            binary: tempo-mpp
            os: macos-latest
            target: aarch64-apple-darwin
            asset: tempo-mpp-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.package }}
      - run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}
      - run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.version.outputs.version }}"
          gh release create "$TAG" artifacts/* --title "$TAG" --generate-notes || \
          gh release upload "$TAG" artifacts/* --clobber

      - name: Sign release binaries
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          echo -n "$RELEASE_SIGNING_KEY" | base64 -d > /tmp/release.key
          SKILL_SHA256=$(sha256sum crates/tempo-mpp/SKILL.md | cut -d' ' -f1)
          VERSION="${{ needs.version.outputs.version }}"
          cargo run -p tempo-sign -- \
            --key-file /tmp/release.key \
            --artifacts-dir artifacts \
            --version "$VERSION" \
            --base-url https://cli.tempo.xyz/extensions/tempo-wallet \
            --skill "https://cli.tempo.xyz/extensions/tempo-wallet/v${VERSION}/SKILL.md" \
            --skill-sha256 "$SKILL_SHA256" \
            --output artifacts/manifest.json
          rm /tmp/release.key

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws configure set default.s3.multipart_threshold 200MB

          VERSION="v${{ needs.version.outputs.version }}"

          # Upload tempo-cli binaries (top-level, no versioned path)
          for f in artifacts/tempo-linux-* artifacts/tempo-darwin-*; do
            [ -f "$f" ] || continue
            aws s3 cp "$f" "s3://tempo-cli/$(basename "$f")" --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Upload extension binaries (tempo-wallet and tempo-mpp)
          for pkg in tempo-wallet tempo-mpp; do
            for f in artifacts/${pkg}-*; do
              [ -f "$f" ] || continue
              BASENAME=$(basename "$f")
              aws s3 cp "$f" "s3://tempo-cli/extensions/${pkg}/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
              aws s3 cp "$f" "s3://tempo-cli/extensions/${pkg}/${VERSION}/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
            done
          done

          # Upload signed manifest (latest + versioned)
          aws s3 cp artifacts/manifest.json "s3://tempo-cli/extensions/tempo-wallet/manifest.json" --endpoint-url "$AWS_ENDPOINT_URL"
          aws s3 cp artifacts/manifest.json "s3://tempo-cli/extensions/tempo-wallet/${VERSION}/manifest.json" --endpoint-url "$AWS_ENDPOINT_URL"

          # Upload install script
          aws s3 cp scripts/install.sh "s3://tempo-cli/install" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"

          # Upload AI skill and VERSION file
          aws s3 cp crates/tempo-mpp/SKILL.md "s3://tempo-cli/extensions/tempo-wallet/SKILL.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"
          aws s3 cp crates/tempo-mpp/SKILL.md "s3://tempo-cli/extensions/tempo-wallet/${VERSION}/SKILL.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"
          echo "${{ needs.version.outputs.version }}" > VERSION
          aws s3 cp VERSION "s3://tempo-cli/extensions/tempo-wallet/VERSION" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"

          echo "Released ${VERSION}"
