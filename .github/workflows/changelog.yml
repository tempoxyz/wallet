name: Changelog

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install changelogs
        run: curl -sSL https://changelogs.sh | sh
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Generate changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Skip if only infra/config files changed (no code changes requiring changelog)
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          CODE_CHANGES=$(echo "$CHANGED" | grep -vE '^(\.changelog/|\.github/|\.gitignore|README\.md|AGENTS\.md|CONTRIBUTING\.md)' || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "No code changes requiring changelog, skipping"
            exit 0
          fi
          cargo --version || echo "NO CARGO"
          cargo metadata --format-version 1 --no-deps 2>&1 | python3 -c "import json,sys; d=json.load(sys.stdin); print('root:', d.get('workspace_root','')); print('packages:', [p['name'] for p in d.get('packages',[])]); print('members:', d.get('workspace_members',[]))" || echo "METADATA FAILED: $?"
          ~/.local/bin/changelogs add --ai "claude -p" --ref origin/${{ github.base_ref }}
      - name: Commit changelog
        run: |
          if [ -n "$(git status --porcelain .changelog/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .changelog/
            git commit -m "chore: add changelog"
            git push
          fi
