name: Changelog

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install changelogs
        run: curl -sSL https://changelogs.sh | sh
      - name: Generate changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Skip if only changelog files changed
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qvE '^\.changelog/'; then
            echo "No code changes, skipping changelog generation"
            exit 0
          fi
          # Re-init to ensure ecosystem is detected
          ~/.local/bin/changelogs init --ecosystem rust --force || true
          ~/.local/bin/changelogs add --ai "claude" --ref origin/${{ github.base_ref }}
      - name: Commit changelog
        run: |
          if [ -n "$(git status --porcelain .changelog/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .changelog/
            git commit -m "chore: add changelog"
            git push
          fi
