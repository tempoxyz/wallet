name: Version

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Changelogs
        id: changelogs
        uses: wevm/changelogs-rs@master
        with:
          conventional-commit: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Check for new release
        id: check
        if: steps.changelogs.outputs.published == 'true'
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version $VERSION published, triggering release"

  release:
    name: Release
    needs: version
    if: needs.version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        run: gh workflow run release.yml -f version=${{ needs.version.outputs.new_version }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
