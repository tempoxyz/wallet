name: Version

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Install changelogs
        run: curl -sSL https://changelogs.sh | sh

      - name: Check for pending changelogs
        id: check
        run: |
          CHANGELOGS=$(find .changelog -name '*.md' ! -name 'README.md' ! -name 'config.toml' 2>/dev/null | head -1)
          if [ -n "$CHANGELOGS" ]; then
            echo "has_changelogs=true" >> $GITHUB_OUTPUT
            echo "Found pending changelogs"
          else
            echo "has_changelogs=false" >> $GITHUB_OUTPUT
            echo "No pending changelogs"
          fi

      - name: Run changelogs version
        id: version
        if: steps.check.outputs.has_changelogs == 'true'
        run: |
          ~/.local/bin/changelogs version --ecosystem rust

          # Get the new version from Cargo.toml
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: Create version PR
        if: steps.check.outputs.has_changelogs == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: release v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: release v${VERSION}" \
            --body "$(cat <<EOF
          ## Release v${VERSION}

          This PR was automatically created by the version workflow.

          ### Changes
          See CHANGELOG.md for details.

          ### Release Process
          When this PR is merged:
          1. A git tag \`v${VERSION}\` will be created
          2. The release workflow will build and publish binaries
          EOF
          )" \
            --label "release"

  # Create tag when a release PR is merged (no pending changelogs)
  tag:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.released != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check if this is a release commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" =~ ^chore:\ release\ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected release commit for v$VERSION"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not a release commit"
          fi

      - name: Create and push tag
        if: steps.check.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"
