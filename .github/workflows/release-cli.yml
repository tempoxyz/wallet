name: Release CLI

on:
  push:
    branches: [main]
    paths:
      - 'crates/tempo-cli/**'
      - '.github/workflows/release-cli.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tempo-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: tempo-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: tempo-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} -p tempo-cli
      - run: strip target/${{ matrix.target }}/release/tempo
      - run: mv target/${{ matrix.target }}/release/tempo ${{ matrix.asset }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws configure set default.s3.multipart_threshold 200MB
          for f in artifacts/tempo-*; do
            aws s3 cp "$f" "s3://tempo-cli/$(basename "$f")" --endpoint-url "$AWS_ENDPOINT_URL"
          done
          aws s3 cp scripts/install.sh "s3://tempo-cli/install" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"
